name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Typecheck + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: openrouter/package-lock.json

      - name: Install dependencies
        working-directory: openrouter
        run: npm ci

      - name: Typecheck
        working-directory: openrouter
        run: npm run typecheck

      - name: Unit tests
        working-directory: openrouter
        run: npm test

      - name: Integration tests
        working-directory: openrouter
        run: npm run test:integration
        timeout-minutes: 5

      - name: Check dist is up to date
        working-directory: openrouter
        run: npm run check-dist
