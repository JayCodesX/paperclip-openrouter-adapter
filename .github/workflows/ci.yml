name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Typecheck + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout adapter
        uses: actions/checkout@v4

      - name: Checkout orager
        uses: actions/checkout@v4
        with:
          repository: JayCodesX/orager
          path: orager

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: openrouter/package-lock.json

      - name: Install adapter dependencies
        working-directory: openrouter
        run: npm ci

      - name: Install and build orager
        working-directory: orager
        run: npm ci && npm run build

      - name: Typecheck
        working-directory: openrouter
        run: npm run typecheck

      - name: Unit tests
        working-directory: openrouter
        run: npm test

      - name: Integration tests
        working-directory: openrouter
        run: npm run test:integration
        timeout-minutes: 5
        env:
          ORAGER_DIST: ${{ github.workspace }}/orager/dist/index.js

      - name: Check dist is up to date
        working-directory: openrouter
        run: npm run check-dist
